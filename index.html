<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Correlation Graph — Boxel Studio</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font-sans: 'IBM Plex Sans', sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;
  --bg: #0e0f11;
  --bg2: #161719;
  --bg3: #1e2023;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #e8e6df;
  --text2: #9c9a92;
  --text3: #5c5b56;
  --blue: #378ADD;
  --blue-light: #B5D4F4;
  --blue-dark: #0C447C;
  --teal: #1D9E75;
  --teal-light: #9FE1CB;
  --purple: #7F77DD;
  --purple-light: #CECBF6;
  --amber: #EF9F27;
  --amber-light: #FAC775;
  --coral: #D85A30;
  --coral-light: #F5C4B3;
  --gray: #888780;
  --radius: 10px;
  --radius-sm: 6px;
}

@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 32px 24px;
}

.page { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 28px; }

header {
  display: flex; align-items: baseline; gap: 14px;
  border-bottom: 0.5px solid var(--border2);
  padding-bottom: 16px;
}
header h1 { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -.01em; }
header .sub { font-size: 12px; color: var(--text3); font-family: var(--font-mono); }

.section-label {
  font-size: 10px; font-weight: 500; color: var(--text3);
  text-transform: uppercase; letter-spacing: .1em; margin-bottom: 10px;
}

/* Legend */
.legend { display: flex; flex-wrap: wrap; gap: 10px; }
.leg { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
.dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* Graph card */
.graph-card {
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  overflow: hidden;
}

svg.graph { width: 100%; display: block; }

/* Query section */
.queries { display: flex; flex-direction: column; gap: 6px; }
.q-btn {
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 13px;
  font-family: var(--font-sans);
  color: var(--text2);
  cursor: pointer;
  text-align: left;
  transition: border-color .15s, color .15s, background .15s;
  display: flex; align-items: center; gap: 10px;
  width: 100%;
}
.q-btn:hover { border-color: var(--border2); color: var(--text); background: var(--bg3); }
.q-btn.active { border-color: var(--purple); color: var(--text); background: var(--bg3); }
.q-arrow { color: var(--text3); font-size: 10px; flex-shrink: 0; transition: transform .15s; }
.q-btn.active .q-arrow { transform: rotate(90deg); color: var(--purple-light); }

.answer {
  background: var(--bg3);
  border: 0.5px solid var(--border2);
  border-left: 2px solid var(--purple);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  font-size: 13px;
  color: var(--text2);
  line-height: 1.7;
  display: none;
  margin-top: 4px;
}
.answer.visible { display: block; }
.answer strong { color: var(--text); font-weight: 500; }
.answer code {
  font-family: var(--font-mono);
  font-size: 11px;
  background: rgba(255,255,255,0.06);
  padding: 1px 5px;
  border-radius: 3px;
  color: var(--blue-light);
}
.highlight { color: var(--amber-light); font-weight: 500; }

/* Node detail */
.node-detail {
  background: var(--bg3);
  border: 0.5px solid var(--border2);
  border-left: 2px solid var(--blue);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  font-size: 13px;
  color: var(--text2);
  line-height: 1.7;
  display: none;
}
.node-detail.visible { display: block; }
.node-detail strong { color: var(--text); font-weight: 500; }
.node-detail-hint { font-size: 11px; color: var(--text3); margin-top: 6px; font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="page">

  <header>
    <h1>Correlation Graph</h1>
    <span class="sub">project digital footprint · Boxel Studio</span>
  </header>

  <div>
    <div class="section-label">Node types</div>
    <div class="legend">

    <line x1="320" y1="58" x2="320" y2="148" stroke="#444" stroke-width="0.8" marker-end="url(#arr)" fill="none"/>
    <line x1="320" y1="58" x2="462" y2="148" stroke="#444" stroke-width="0.8" marker-end="url(#arr)" fill="none"/>

    <!-- Shot 204 → incidentes -->
    <line x1="178" y1="178" x2="178" y2="268" stroke="#555" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arr)" fill="none"/>
    <line x1="178" y1="178" x2="106" y2="268" stroke="#555" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arr)" fill="none"/>

    <!-- Shot 211 → incidente -->
    <line x1="320" y1="178" x2="300" y2="268" stroke="#555" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arr)" fill="none"/>

    <!-- Incidente retake 204 → mensajes -->
    <line x1="178" y1="300" x2="130" y2="388" stroke="#993C1D" stroke-width="0.7" stroke-dasharray="3 3" marker-end="url(#arr)" fill="none"/>
    <line x1="178" y1="300" x2="220" y2="388" stroke="#993C1D" stroke-width="0.7" stroke-dasharray="3 3" marker-end="url(#arr)" fill="none"/>
    <line x1="178" y1="300" x2="178" y2="388" stroke="#993C1D" stroke-width="0.7" stroke-dasharray="3 3" marker-end="url(#arr)" fill="none"/>

    <!-- Personas → incidentes -->
    <line x1="490" y1="200" x2="300" y2="290" stroke="#0F6E56" stroke-width="0.7" stroke-dasharray="3 3" marker-end="url(#arr)" fill="none"/>
    <line x1="490" y1="200" x2="178" y2="290" stroke="#0F6E56" stroke-width="0.7" stroke-dasharray="3 3" marker-end="url(#arr)" fill="none"/>
    <line x1="560" y1="260" x2="300" y2="290" stroke="#0F6E56" stroke-width="0.7" stroke-dasharray="3 3" marker-end="url(#arr)" fill="none"/>

    <!-- Asset → shot 204 -->
    <line x1="480" y1="340" x2="210" y2="290" stroke="#555" stroke-width="0.7" marker-end="url(#arr)" fill="none"/>

    <!-- Incidente bloqueo → retake (precedió) -->
    <line x1="140" y1="284" x2="144" y2="284" stroke="#7F77DD" stroke-width="1" marker-end="url(#arr)" fill="none"/>
    <line x1="106" y1="268" x2="156" y2="268" stroke="#7F77DD" stroke-width="1" marker-end="url(#arr)" fill="none"/>
    <text x="131" y="263" text-anchor="middle" font-size="9" fill="#AFA9EC" font-family="'IBM Plex Sans',sans-serif">precedió</text>

    <!-- Shot 204 → shot 211 -->
    <line x1="208" y1="163" x2="290" y2="163" stroke="#444" stroke-width="0.7" stroke-dasharray="2 3" marker-end="url(#arr)" fill="none"/>
    <text x="249" y="157" text-anchor="middle" font-size="9" fill="#666" font-family="'IBM Plex Sans',sans-serif">misma sec.</text>

    <!-- contiene_shot label -->
    <text x="370" y="104" text-anchor="middle" font-size="9" fill="#555" font-family="'IBM Plex Sans',sans-serif">contiene_shot</text>

    <!-- Episodio -->
    <g style="cursor:pointer" onclick="showNode('EP03','Nodo raíz del proyecto. Conecta todos los shots, incidentes y personas del episodio. Permite preguntas como: ¿cuántos incidentes activos tiene este episodio? ¿cuál es su ratio de retakes vs el ep02 en la misma semana de producción?')">
      <circle cx="320" cy="44" r="22" fill="#1a1608" stroke="#EF9F27" stroke-width="1.2"/>
      <text x="320" y="41" text-anchor="middle" font-size="11" font-weight="500" fill="#FAC775" font-family="'IBM Plex Sans',sans-serif">EP03</text>
      <text x="320" y="53" text-anchor="middle" font-size="9" fill="#BA7517" font-family="'IBM Plex Sans',sans-serif">episodio</text>
    </g>

    <!-- Shots -->
    <g style="cursor:pointer" onclick="showNode('ABC_0204','Shot comp, exterior día. 3 retakes activos. Cycle time actual: 9 días vs promedio histórico 4.2 días. Señal de anomalía activa. Incidentes vinculados: bloqueo por brief ambiguo + retake color timing.')">
      <circle cx="178" cy="163" r="22" fill="#07192e" stroke="#378ADD" stroke-width="1.2"/>
      <text x="178" y="160" text-anchor="middle" font-size="11" font-weight="500" fill="#B5D4F4" font-family="'IBM Plex Sans',sans-serif">0204</text>
      <text x="178" y="172" text-anchor="middle" font-size="9" fill="#185FA5" font-family="'IBM Plex Sans',sans-serif">shot · comp</text>
    </g>
    <g style="cursor:pointer" onclick="showNode('ABC_0211','Shot comp, interior noche. 1 retake. Cycle time actual: 5.1 días (normal). Misma secuencia que 0204 — si el problema de color timing es de secuencia, candidato a retake preventivo.')">
      <circle cx="320" cy="163" r="22" fill="#07192e" stroke="#378ADD" stroke-width="1.2"/>
      <text x="320" y="160" text-anchor="middle" font-size="11" font-weight="500" fill="#B5D4F4" font-family="'IBM Plex Sans',sans-serif">0211</text>
      <text x="320" y="172" text-anchor="middle" font-size="9" fill="#185FA5" font-family="'IBM Plex Sans',sans-serif">shot · comp</text>
    </g>
    <g style="cursor:pointer" onclick="showNode('ABC_0198','Shot aprobado. Sin incidentes activos. Cycle time: 3.8 días.')">
      <circle cx="462" cy="163" r="22" fill="#07192e" stroke="#378ADD" stroke-width="1.2"/>
      <text x="462" y="160" text-anchor="middle" font-size="11" font-weight="500" fill="#B5D4F4" font-family="'IBM Plex Sans',sans-serif">0198</text>
      <text x="462" y="172" text-anchor="middle" font-size="9" fill="#185FA5" font-family="'IBM Plex Sans',sans-serif">shot · aprobado</text>
    </g>

    <!-- Incidentes -->
    <g style="cursor:pointer" onclick="showNode('Incidente — Bloqueo: brief ambiguo','Detectado hace 5 días. Origen: email del cliente (3-Nov) sin confirmación del color timing de la secuencia exterior. Estado: no resuelto al momento del retake. Esta relación «precedió» al incidente de retake es la causa raíz inferida por el LLM.')">
      <rect x="72" y="268" width="68" height="32" rx="6" fill="#100d1f" stroke="#7F77DD" stroke-width="1"/>
      <text x="106" y="281" text-anchor="middle" font-size="10" font-weight="500" fill="#CECBF6" font-family="'IBM Plex Sans',sans-serif">Bloqueo</text>
      <text x="106" y="292" text-anchor="middle" font-size="9" fill="#AFA9EC" font-family="'IBM Plex Sans',sans-serif">brief ambiguo</text>
    </g>
    <g style="cursor:pointer" onclick="showNode('Incidente — Retake: color timing','Abierto hace 2 días. Causa raíz inferida: brief sin confirmar (ver incidente anterior). Evidencia: 1 email, 2 mensajes Slack, 1 nota ShotGrid. Costo estimado: 1.5 días artista. Tercer retake de este tipo en el episodio — señal de problema sistémico.')">
      <rect x="144" y="268" width="68" height="32" rx="6" fill="#100d1f" stroke="#7F77DD" stroke-width="1"/>
      <text x="178" y="281" text-anchor="middle" font-size="10" font-weight="500" fill="#CECBF6" font-family="'IBM Plex Sans',sans-serif">Retake</text>
      <text x="178" y="292" text-anchor="middle" font-size="9" fill="#AFA9EC" font-family="'IBM Plex Sans',sans-serif">color timing</text>
    </g>
    <g style="cursor:pointer" onclick="showNode('Incidente — Retake: grade incorrecto','Shot 211. Abierto hace 1 día. Sin incidente previo documentado — retake aislado o inicio de patrón. A monitorear.')">
      <rect x="266" y="268" width="68" height="32" rx="6" fill="#100d1f" stroke="#7F77DD" stroke-width="1"/>
      <text x="300" y="281" text-anchor="middle" font-size="10" font-weight="500" fill="#CECBF6" font-family="'IBM Plex Sans',sans-serif">Retake</text>
      <text x="300" y="292" text-anchor="middle" font-size="9" fill="#AFA9EC" font-family="'IBM Plex Sans',sans-serif">grade incorrecto</text>
    </g>

    <!-- Personas -->
    <g style="cursor:pointer" onclick="showNode('John — vendor PM','Involucrado en 4 incidentes activos del ep03. Tiempo promedio de respuesta a emails: 6.2h. En el incidente de brief ambiguo: envió el email original pero no recibió confirmación en 4 días.')">
      <circle cx="490" cy="200" r="18" fill="#061a11" stroke="#1D9E75" stroke-width="1"/>
      <text x="490" y="197" text-anchor="middle" font-size="10" font-weight="500" fill="#9FE1CB" font-family="'IBM Plex Sans',sans-serif">John</text>
      <text x="490" y="208" text-anchor="middle" font-size="9" fill="#0F6E56" font-family="'IBM Plex Sans',sans-serif">vendor PM</text>
    </g>
    <g style="cursor:pointer" onclick="showNode('Supervisor comp','Involucrado en 2 retakes activos. WIP de review actual: 14 shots. Tiempo promedio de review: 1.8 días — por encima del umbral (1.5d). Señal de saturación emergente.')">
      <circle cx="560" cy="260" r="18" fill="#061a11" stroke="#1D9E75" stroke-width="1"/>
      <text x="560" y="257" text-anchor="middle" font-size="10" font-weight="500" fill="#9FE1CB" font-family="'IBM Plex Sans',sans-serif">Sup.</text>
      <text x="560" y="268" text-anchor="middle" font-size="9" fill="#0F6E56" font-family="'IBM Plex Sans',sans-serif">comp</text>
    </g>

    <!-- Asset -->
    <g style="cursor:pointer" onclick="showNode('LUT exterior día v3','Consumido por 0204 y candidato para 0211. Si el color timing es un problema de LUT, afecta toda la secuencia — no solo shots individuales. Esta relación permite detectar ese patrón antes de que los retakes se multipliquen.')">
      <rect x="452" y="322" width="56" height="32" rx="6" fill="#18181a" stroke="#888780" stroke-width="1"/>
      <text x="480" y="335" text-anchor="middle" font-size="10" font-weight="500" fill="#D3D1C7" font-family="'IBM Plex Sans',sans-serif">LUT ext</text>
      <text x="480" y="346" text-anchor="middle" font-size="9" fill="#5F5E5A" font-family="'IBM Plex Sans',sans-serif">día v3</text>
    </g>

    <!-- Mensajes / evidencia -->
    <g style="cursor:pointer" onclick="showNode('Email — John, 3-Nov','«Color timing confirmation needed for exterior day sequence before we proceed» — sin respuesta confirmada durante 4 días. Fuente primaria del brief ambiguo. Capturado via Gmail API.')">
      <rect x="100" y="380" width="60" height="28" rx="5" fill="#1a0c08" stroke="#D85A30" stroke-width="0.8"/>
      <text x="130" y="391" text-anchor="middle" font-size="9" font-weight="500" fill="#F5C4B3" font-family="'IBM Plex Sans',sans-serif">Email</text>
      <text x="130" y="401" text-anchor="middle" font-size="8" fill="#993C1D" font-family="'IBM Plex Sans',sans-serif">John · 3-Nov</text>
    </g>
    <g style="cursor:pointer" onclick="showNode('Slack — #ep03-prod, 6-Nov','«ojo viene retake de grade en 204, John confirmó que no habían recibido respuesta del color» — capturado via Slack API.')">
      <rect x="190" y="380" width="60" height="28" rx="5" fill="#1a0c08" stroke="#D85A30" stroke-width="0.8"/>
      <text x="220" y="391" text-anchor="middle" font-size="9" font-weight="500" fill="#F5C4B3" font-family="'IBM Plex Sans',sans-serif">Slack</text>
      <text x="220" y="401" text-anchor="middle" font-size="8" fill="#993C1D" font-family="'IBM Plex Sans',sans-serif">#ep03 · 6-Nov</text>
    </g>
    <g style="cursor:pointer" onclick="showNode('ShotGrid note — retake abierto','Nota de retake: «fix grade per client notes» — capturado via ShotGrid EventLog, entity: Version 0204_comp_v007.')">
      <rect x="148" y="380" width="60" height="28" rx="5" fill="#1a0c08" stroke="#D85A30" stroke-width="0.8"/>
      <text x="178" y="391" text-anchor="middle" font-size="9" font-weight="500" fill="#F5C4B3" font-family="'IBM Plex Sans',sans-serif">SG note</text>
      <text x="178" y="401" text-anchor="middle" font-size="8" fill="#993C1D" font-family="'IBM Plex Sans',sans-serif">8-Nov</text>
    </g>
    </svg>
  </div>

  <div id="node-detail" class="node-detail">
    <em style="color:#5c5b56;font-size:12px">Click any node to inspect it.</em>
  </div>

  <div>
    <div class="section-label">Graph traversal — sample queries</div>
    <div class="queries">
      <button class="q-btn" id="qb1" onclick="showQ(1)"><span class="q-arrow">▶</span> What events preceded the retake on shot 0204?</button>
      <div id="qa1" class="answer"></div>
      <button class="q-btn" id="qb2" onclick="showQ(2)"><span class="q-arrow">▶</span> Are other shots at risk from the same issue?</button>
      <div id="qa2" class="answer"></div>
      <button class="q-btn" id="qb3" onclick="showQ(3)"><span class="q-arrow">▶</span> Who is involved in the most active incidents in ep03?</button>
      <div id="qa3" class="answer"></div>
      <button class="q-btn" id="qb4" onclick="showQ(4)"><span class="q-arrow">▶</span> Has this retake pattern appeared in previous episodes?</button>
      <div id="qa4" class="answer"></div>
    </div>
  </div>

</div>

<script>
const answers = {
  1: `<strong>Traversal:</strong> <code>Shot(0204) → tiene_incidente → Incidente(Bloqueo, brief ambiguo) → evidencia → Email(John, 3-Nov)</code><br><br>The graph traces the chain: 5 days before the retake, John sent an email requesting color timing confirmation for the exterior day sequence. No confirmed response was received. When the retake opened in ShotGrid, the LLM connected that unresolved thread to the retake cause — something that in a flat table would require manual search across Gmail.<br><br><span class="highlight">Inferred root cause: process defect (unconfirmed information), not artistic error.</span>`,
  2: `<strong>Traversal:</strong> <code>Shot(0204) → misma_secuencia → Shot(0211) → usa_asset → LUT exterior día v3</code><br><br>Shot 0211 is in the same exterior sequence and shares the same LUT. If the color timing problem is a LUT issue (not an individual comp issue), 0211 has high retake probability. The graph enables that inference before the retake opens — <span class="highlight">preventive action is possible.</span><br><br>Without the graph, this connection exists only in the comp supervisor's head.`,
  3: `<strong>Traversal:</strong> <code>Persona → involucrada_en → Incidente (all)</code>, ordered by connection degree.<br><br>John appears in 4 of 6 active ep03 incidents as actor or recipient. That doesn't mean he is the problem — it may mean he is the bottleneck in the information flow between Boxel and the vendor. <span class="highlight">The useful question is not "who fails?" but "where does friction accumulate?"</span><br><br>This view needs careful framing before sharing with production.`,
  4: `<strong>Traversal:</strong> <code>Incidente(tipo: retake_color_timing) → ocurrió_en → [EP01, EP02, EP03]</code><br><br>If the graph holds history from previous episodes: EP01 had 2 color timing retakes in week 4. EP02 had 4 of the same type concentrated in week 5. We're in week 4 of EP03 with 3 active retakes. <span class="highlight">The pattern suggests the problem is not the team — it's the lookdev confirmation process with the client.</span><br><br>That's institutional memory that normally evaporates between episodes.`
};

let activeQ = null;

function showQ(n) {
  if (activeQ === n) {
    document.getElementById('qa'+n).classList.remove('visible');
    document.getElementById('qb'+n).classList.remove('active');
    activeQ = null;
    return;
  }
  if (activeQ) {
    document.getElementById('qa'+activeQ).classList.remove('visible');
    document.getElementById('qb'+activeQ).classList.remove('active');
  }
  activeQ = n;
  const el = document.getElementById('qa'+n);
  el.innerHTML = answers[n];
  el.classList.add('visible');
  document.getElementById('qb'+n).classList.add('active');
  document.getElementById('node-detail').classList.remove('visible');
}

function showNode(name, detail) {
  const el = document.getElementById('node-detail');
  el.innerHTML = '<strong>' + name + '</strong><br><br>' + detail;
  el.classList.add('visible');
  if (activeQ) {
    document.getElementById('qa'+activeQ).classList.remove('visible');
    document.getElementById('qb'+activeQ).classList.remove('active');
    activeQ = null;
  }
}
</script>
</body>
</html>
